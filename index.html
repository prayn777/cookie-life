<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#fff8f0" />
  <title>Cookie 的生活紀錄</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <div class="header-title">
        <div class="avatar-wrap">
          <img id="header-avatar" class="avatar-img" src="" alt="Cookie" />
          <label class="avatar-change" title="更換照片">📷
            <input type="file" id="avatar-upload" accept="image/*" style="display:none" onchange="changeAvatar(this)" />
          </label>
        </div>
        <div class="header-info">
          <h1 id="pet-name" class="editable-field" onclick="editField('pet-name')" title="點擊編輯">Cookie</h1>
          <p id="pet-info" class="editable-field editable-sub" onclick="editField('pet-info')" title="點擊編輯">米克斯 · 約 5 歲 · 17kg</p>
          <p class="days-counter">在一起第 <span id="days-count">—</span> 天 🐾</p>
        </div>
      </div>
    </div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="diary">成長日記</button>
    <button class="tab-btn" data-tab="weight">體重</button>
    <button class="tab-btn" data-tab="vet">獸醫</button>
    <button class="tab-btn" data-tab="grooming">洗澡</button>
    <button class="tab-btn" data-tab="medication">用藥</button>
    <button class="tab-btn" data-tab="food">零食飼料</button>
    <button class="tab-btn" data-tab="clothes">裝備</button>
  </nav>

  <main class="app-main">

    <!-- 成長日記 -->
    <section id="tab-diary" class="tab-section active">
      <div class="section-top">
        <h2 class="section-title">成長日記</h2>
        <button class="btn-add" onclick="openModal('diary')">＋ 新增</button>
      </div>
      <div id="diary-list" class="timeline-list"></div>
    </section>

    <!-- 體重 -->
    <section id="tab-weight" class="tab-section">
      <div class="section-top">
        <h2 class="section-title">體重追蹤</h2>
        <button class="btn-add" onclick="openModal('weight')">＋ 新增</button>
      </div>
      <div id="weight-chart-wrap" class="chart-wrap"><canvas id="weightChart"></canvas></div>
      <div id="weight-list" class="card-list"></div>
    </section>

    <!-- 獸醫 -->
    <section id="tab-vet" class="tab-section">
      <div class="section-top">
        <h2 class="section-title">獸醫紀錄</h2>
        <button class="btn-add" onclick="openModal('vet')">＋ 新增</button>
      </div>
      <div id="vet-list" class="card-list"></div>
    </section>

    <!-- 洗澡 -->
    <section id="tab-grooming" class="tab-section">
      <div class="section-top">
        <h2 class="section-title">洗澡紀錄</h2>
        <button class="btn-add" onclick="openModal('grooming')">＋ 新增</button>
      </div>
      <div id="grooming-list" class="card-list"></div>
    </section>

    <!-- 用藥 -->
    <section id="tab-medication" class="tab-section">
      <div class="section-top">
        <h2 class="section-title">用藥紀錄</h2>
        <button class="btn-add" onclick="openModal('medication')">＋ 新增</button>
      </div>
      <div id="medication-table" class="med-table-wrap"></div>
    </section>

    <!-- 零食飼料 -->
    <section id="tab-food" class="tab-section">
      <div class="section-top">
        <h2 class="section-title">零食 &amp; 飼料</h2>
        <button class="btn-add" onclick="openModal('food')">＋ 新增</button>
      </div>
      <div id="food-list" class="food-grid"></div>
    </section>

    <!-- 裝備 -->
    <section id="tab-clothes" class="tab-section">
      <div class="section-top">
        <h2 class="section-title">衣物裝備</h2>
        <button class="btn-add" onclick="openModal('clothes')">＋ 新增</button>
      </div>
      <div id="clothes-list" class="clothes-grid"></div>
    </section>

  </main>

  <!-- Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()"></div>

  <!-- Modal: 日記（新增） -->
  <div id="modal-diary" class="modal hidden">
    <div class="modal-header"><h3>新增日記</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <label>日期</label><input type="date" id="diary-date" />
      <label>里程碑（選填）</label><input type="text" id="diary-milestone" placeholder="例：確定領養！露營 No.1" />
      <label>內容</label><textarea id="diary-content" rows="3" placeholder="記錄今天發生的事…"></textarea>
      <label>心情小記（選填）</label><textarea id="diary-note" rows="2" placeholder="心情、觀察…"></textarea>
      <label>照片（選填）</label><input type="file" id="diary-photo" accept="image/*" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveRecord('diary')">儲存</button>
    </div>
  </div>

  <!-- Modal: 日記（編輯） -->
  <div id="modal-diary-edit" class="modal hidden">
    <div class="modal-header"><h3>編輯日記</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="edit-diary-id" />
      <label>日期</label><input type="date" id="edit-diary-date" />
      <label>里程碑（選填）</label><input type="text" id="edit-diary-milestone" />
      <label>內容</label><textarea id="edit-diary-content" rows="3"></textarea>
      <label>心情小記（選填）</label><textarea id="edit-diary-note" rows="2"></textarea>
      <label>新增照片（選填）</label><input type="file" id="edit-diary-photo" accept="image/*" />
      <div id="edit-diary-photo-preview"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveEditDiary()">儲存</button>
    </div>
  </div>

  <!-- Modal: 體重 -->
  <div id="modal-weight" class="modal hidden">
    <div class="modal-header"><h3>新增體重</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <label>日期</label><input type="date" id="weight-date" />
      <label>體重（kg）</label><input type="number" id="weight-kg" step="0.1" placeholder="例：17.2" />
      <label>備註（選填）</label><input type="text" id="weight-note" placeholder="例：健檢量的" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveRecord('weight')">儲存</button>
    </div>
  </div>

  <!-- Modal: 獸醫 -->
  <div id="modal-vet" class="modal hidden">
    <div class="modal-header"><h3>新增獸醫紀錄</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <label>日期</label><input type="date" id="vet-date" />
      <label>診所名稱</label><input type="text" id="vet-clinic" placeholder="例：加恩動物醫院" />
      <label>就診原因</label><input type="text" id="vet-reason" placeholder="例：年度健檢、疫苗" />
      <label>診斷／結果（選填）</label><textarea id="vet-diagnosis" rows="2"></textarea>
      <label>費用（NT$）</label><input type="number" id="vet-cost" placeholder="例：1200" />
      <label>備註（選填）</label><input type="text" id="vet-note" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveRecord('vet')">儲存</button>
    </div>
  </div>

  <!-- Modal: 洗澡 -->
  <div id="modal-grooming" class="modal hidden">
    <div class="modal-header"><h3>新增洗澡紀錄</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <label>日期</label><input type="date" id="grooming-date" />
      <label>店家名稱</label><input type="text" id="grooming-shop" placeholder="例：毛孩美容坊" />
      <label>服務項目</label><input type="text" id="grooming-service" placeholder="例：全套洗澡、剃毛" />
      <label>費用（NT$）</label><input type="number" id="grooming-cost" placeholder="例：800" />
      <label>備註（選填）</label><input type="text" id="grooming-note" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveRecord('grooming')">儲存</button>
    </div>
  </div>

  <!-- Modal: 用藥 -->
  <div id="modal-medication" class="modal hidden">
    <div class="modal-header"><h3>新增用藥排程</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <label>藥品名稱</label><input type="text" id="medication-name" placeholder="例：免操心、一錠除" />
      <label>起始日期</label><input type="date" id="medication-start" />
      <label>週期</label>
      <select id="medication-cycle">
        <option value="1">每月（1 個月）</option>
        <option value="3">每季（3 個月）</option>
      </select>
      <label>預計幾次</label><input type="number" id="medication-count" placeholder="例：12" value="12" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveMedSchedule()">儲存</button>
    </div>
  </div>

  <!-- Modal: 零食飼料 -->
  <div id="modal-food" class="modal hidden">
    <div class="modal-header"><h3>新增零食／飼料</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <label>品名</label><input type="text" id="food-name" placeholder="例：凍乾雞肉零食" />
      <label>牌子（選填）</label><input type="text" id="food-brand" placeholder="例：Ziwi Peak" />
      <label>食用心得</label><textarea id="food-review" rows="2" placeholder="Cookie 喜歡嗎？有什麼特別的地方…"></textarea>
      <label>評分</label>
      <div class="star-input" id="star-input">
        <span class="star" data-val="1">★</span>
        <span class="star" data-val="2">★</span>
        <span class="star" data-val="3">★</span>
        <span class="star" data-val="4">★</span>
        <span class="star" data-val="5">★</span>
      </div>
      <input type="hidden" id="food-rating" value="0" />
      <label>價格（NT$，選填）</label><input type="number" id="food-price" placeholder="例：350" />
      <label>照片（選填）</label><input type="file" id="food-photo" accept="image/*" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveRecord('food')">儲存</button>
    </div>
  </div>

  <!-- Modal: 裝備 -->
  <div id="modal-clothes" class="modal hidden">
    <div class="modal-header"><h3>新增裝備</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <label>品名</label><input type="text" id="clothes-name" placeholder="例：HURTTA 動能 Rover 胸背帶" />
      <label>尺寸</label><input type="text" id="clothes-size" placeholder="例：55-70" />
      <label>顏色</label><input type="text" id="clothes-color" placeholder="例：檜木橘" />
      <label>購買日期</label><input type="date" id="clothes-date" />
      <label>價格（NT$）</label><input type="number" id="clothes-price" placeholder="例：2350" />
      <label>備註（選填）</label><input type="text" id="clothes-note" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveRecord('clothes')">儲存</button>
    </div>
  </div>

  <!-- Modal: 基本資訊編輯 -->
  <div id="modal-edit" class="modal hidden">
    <div class="modal-header"><h3 id="edit-modal-title">編輯</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <label id="edit-label">內容</label>
      <input type="text" id="edit-input" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveEditField()">儲存</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
