<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#fff8f0" />
  <title>Cookie 的生活紀錄</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-title">
        <span class="paw">🐾</span>
        <div>
          <h1>Cookie</h1>
          <p>米克斯 · 約 5 歲 · 17kg</p>
        </div>
      </div>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="diary">成長日記</button>
    <button class="tab-btn" data-tab="weight">體重</button>
    <button class="tab-btn" data-tab="vet">獸醫</button>
    <button class="tab-btn" data-tab="grooming">洗澡</button>
    <button class="tab-btn" data-tab="medication">用藥</button>
    <button class="tab-btn" data-tab="clothes">裝備</button>
  </nav>

  <!-- Main Content -->
  <main class="app-main">

    <!-- 成長日記 -->
    <section id="tab-diary" class="tab-section active">
      <div class="section-top">
        <h2 class="section-title">成長日記</h2>
        <button class="btn-add" onclick="openModal('diary')">＋ 新增</button>
      </div>
      <div id="diary-list" class="timeline-list"></div>
    </section>

    <!-- 體重追蹤 -->
    <section id="tab-weight" class="tab-section">
      <div class="section-top">
        <h2 class="section-title">體重追蹤</h2>
        <button class="btn-add" onclick="openModal('weight')">＋ 新增</button>
      </div>
      <div id="weight-chart-wrap" class="chart-wrap">
        <canvas id="weightChart"></canvas>
      </div>
      <div id="weight-list" class="card-list"></div>
    </section>

    <!-- 獸醫紀錄 -->
    <section id="tab-vet" class="tab-section">
      <div class="section-top">
        <h2 class="section-title">獸醫紀錄</h2>
        <button class="btn-add" onclick="openModal('vet')">＋ 新增</button>
      </div>
      <div id="vet-list" class="card-list"></div>
    </section>

    <!-- 洗澡紀錄 -->
    <section id="tab-grooming" class="tab-section">
      <div class="section-top">
        <h2 class="section-title">洗澡紀錄</h2>
        <button class="btn-add" onclick="openModal('grooming')">＋ 新增</button>
      </div>
      <div id="grooming-list" class="card-list"></div>
    </section>

    <!-- 用藥紀錄 -->
    <section id="tab-medication" class="tab-section">
      <div class="section-top">
        <h2 class="section-title">用藥紀錄</h2>
        <button class="btn-add" onclick="openModal('medication')">＋ 新增</button>
      </div>
      <div id="medication-list" class="card-list"></div>
    </section>

    <!-- 衣物裝備 -->
    <section id="tab-clothes" class="tab-section">
      <div class="section-top">
        <h2 class="section-title">衣物裝備</h2>
        <button class="btn-add" onclick="openModal('clothes')">＋ 新增</button>
      </div>
      <div id="clothes-list" class="clothes-grid"></div>
    </section>

  </main>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()"></div>

  <!-- Modal: 成長日記 -->
  <div id="modal-diary" class="modal hidden">
    <div class="modal-header">
      <h3>新增日記</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <label>日期</label>
      <input type="date" id="diary-date" />
      <label>里程碑（選填）</label>
      <input type="text" id="diary-milestone" placeholder="例：確定領養！露營 No.1" />
      <label>內容</label>
      <textarea id="diary-content" rows="3" placeholder="記錄今天發生的事…"></textarea>
      <label>心情小記（選填）</label>
      <textarea id="diary-note" rows="2" placeholder="心情、觀察…"></textarea>
      <label>照片（選填）</label>
      <input type="file" id="diary-photo" accept="image/*" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveRecord('diary')">儲存</button>
    </div>
  </div>

  <!-- Modal: 體重 -->
  <div id="modal-weight" class="modal hidden">
    <div class="modal-header">
      <h3>新增體重</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <label>日期</label>
      <input type="date" id="weight-date" />
      <label>體重（kg）</label>
      <input type="number" id="weight-kg" step="0.1" placeholder="例：17.2" />
      <label>備註（選填）</label>
      <input type="text" id="weight-note" placeholder="例：健檢量的" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveRecord('weight')">儲存</button>
    </div>
  </div>

  <!-- Modal: 獸醫 -->
  <div id="modal-vet" class="modal hidden">
    <div class="modal-header">
      <h3>新增獸醫紀錄</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <label>日期</label>
      <input type="date" id="vet-date" />
      <label>診所名稱</label>
      <input type="text" id="vet-clinic" placeholder="例：加恩動物醫院" />
      <label>就診原因</label>
      <input type="text" id="vet-reason" placeholder="例：年度健檢、疫苗" />
      <label>診斷／結果（選填）</label>
      <textarea id="vet-diagnosis" rows="2" placeholder="醫生說了什麼…"></textarea>
      <label>費用（NT$）</label>
      <input type="number" id="vet-cost" placeholder="例：1200" />
      <label>備註（選填）</label>
      <input type="text" id="vet-note" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveRecord('vet')">儲存</button>
    </div>
  </div>

  <!-- Modal: 洗澡 -->
  <div id="modal-grooming" class="modal hidden">
    <div class="modal-header">
      <h3>新增洗澡紀錄</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <label>日期</label>
      <input type="date" id="grooming-date" />
      <label>店家名稱</label>
      <input type="text" id="grooming-shop" placeholder="例：毛孩美容坊" />
      <label>服務項目</label>
      <input type="text" id="grooming-service" placeholder="例：全套洗澡、剃毛" />
      <label>費用（NT$）</label>
      <input type="number" id="grooming-cost" placeholder="例：800" />
      <label>備註（選填）</label>
      <input type="text" id="grooming-note" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveRecord('grooming')">儲存</button>
    </div>
  </div>

  <!-- Modal: 用藥 -->
  <div id="modal-medication" class="modal hidden">
    <div class="modal-header">
      <h3>新增用藥紀錄</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <label>日期</label>
      <input type="date" id="medication-date" />
      <label>藥品名稱</label>
      <input type="text" id="medication-name" placeholder="例：免操心、一錠除" />
      <label>是否已施打</label>
      <select id="medication-done">
        <option value="true">✔ 已完成</option>
        <option value="false">待施打</option>
      </select>
      <label>備註（選填）</label>
      <input type="text" id="medication-note" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveRecord('medication')">儲存</button>
    </div>
  </div>

  <!-- Modal: 衣物裝備 -->
  <div id="modal-clothes" class="modal hidden">
    <div class="modal-header">
      <h3>新增裝備</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <label>品名</label>
      <input type="text" id="clothes-name" placeholder="例：HURTTA 動能 Rover 胸背帶" />
      <label>尺寸</label>
      <input type="text" id="clothes-size" placeholder="例：55-70" />
      <label>顏色</label>
      <input type="text" id="clothes-color" placeholder="例：檜木橘" />
      <label>購買日期</label>
      <input type="date" id="clothes-date" />
      <label>價格（NT$）</label>
      <input type="number" id="clothes-price" placeholder="例：2350" />
      <label>備註（選填）</label>
      <input type="text" id="clothes-note" placeholder="例：土媽送、咬爆重買" />
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveRecord('clothes')">儲存</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
